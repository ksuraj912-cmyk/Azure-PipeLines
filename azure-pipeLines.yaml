trigger:  
    - main
pool:
  vmImage: 'ubuntu-latest'

steps:
    
    - script: |
        sudo apt-get update
        sudo apt-get install -y mono-complete
      displayName: 'Install Mono'
    - script: |
        mcs dotnetcode.cs
        mono dotnetcode.exe
      displayName: 'Compile and run C# file'
      
